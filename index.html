<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H5 Story</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            position: relative;
            height: 100%;
            width: 100%;
            background-color: #000;
            overflow: hidden;
        }
        .swiper {
            width: 100%;
            height: 100%;
        }
        .swiper-slide {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        .click-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
        }
        .click-prev {
            width: 40%;
            height: 100%;
            cursor: pointer;
        }
        .click-next {
            width: 60%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="click-layer">
        <div class="click-prev" onclick="swiper.slidePrev()"></div>
        <div class="click-next" onclick="swiper.slideNext()"></div>
    </div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img src="img1.jpg" alt="Page 1">
            </div>
            <div class="swiper-slide">
                <img src="img2.jpg" alt="Page 2">
            </div>
            <div class="swiper-slide">
                <img src="img3.jpg" alt="Page 3">
            </div>
            <div class="swiper-slide">
                <img src="img4.jpg" alt="Page 4">
            </div>
            <div class="swiper-slide">
                <img src="img5.jpg" alt="Page 5">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // 初始化翻頁核心控制與動畫特效配置
        const swiper = new Swiper('.mySwiper', {
            loop: false,
            effect: 'fade',
            fadeEffect: {
                crossFade: true
            },
            allowTouchMove: false
        });
    </script>
</body>
</html>
